<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Órdenes de Compra</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* ============================================================ RESET & VARIABLES ============================================================ */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:       #0A0C12;
      --bg2:      #0F1117;
      --sidebar:  #0D0F14;
      --card:     #151820;
      --card2:    #1C1F2A;
      --border:   rgba(255,255,255,0.07);
      --border2:  rgba(255,255,255,0.13);
      --text:     #F0F4FF;
      --text2:    #94A3B8;
      --muted:    #475569;
      --input:    #1A1D28;
      --iborder:  rgba(255,255,255,0.08);
      --cc:       #FF1F8C;
      --cc-dim:   rgba(255,31,140,0.12);
      --r-sm:     6px;
      --r:        10px;
      --r-lg:     16px;
    }

    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 13.5px; line-height: 1.5; }
    button, input, select, textarea { font-family: inherit; }
    a { text-decoration: none; color: inherit; }

    /* ============================================================ LAYOUT ============================================================ */
    #app { display: flex; min-height: 100vh; }
    .sidebar { width: 240px; min-height: 100vh; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: fixed; left: 0; top: 0; bottom: 0; z-index: 100; }
    .main { margin-left: 240px; flex: 1; display: flex; flex-direction: column; }
    .main-header { padding: 0 28px; border-bottom: 1px solid var(--border); background: rgba(13,15,20,0.85); backdrop-filter: blur(16px); position: sticky; top: 0; z-index: 50; display: flex; align-items: center; justify-content: space-between; min-height: 60px; }
    .main-body { padding: 28px 32px; flex: 1; padding-bottom: 100px; }

    /* ============================================================ SIDEBAR ============================================================ */
    .sb-header { padding: 18px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
    .sb-logo { width: 34px; height: 34px; border-radius: var(--r-sm); background: var(--cc-dim); display: flex; align-items: center; justify-content: center; font-size: 17px; }
    .sb-brand-name { font-size: 14px; font-weight: 700; letter-spacing: -.3px; }
    .sb-brand-sub { font-size: 10px; color: var(--muted); margin-top: 1px; }
    .sb-nav { flex: 1; padding: 10px 6px; overflow-y: auto; }
    .sb-section { font-size: 9.5px; font-weight: 700; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; padding: 10px 8px 4px; }
    .nav-item { display: flex; align-items: center; gap: 9px; padding: 8px 10px; border-radius: var(--r-sm); cursor: pointer; color: var(--text2); font-size: 13px; font-weight: 500; transition: all .15s; margin-bottom: 1px; }
    .nav-item:hover { background: rgba(255,255,255,0.04); color: var(--text); }
    .nav-item.active { background: var(--cc-dim); color: var(--cc); font-weight: 600; }
    .nav-icon { font-size: 15px; width: 20px; text-align: center; }
    .nav-badge { margin-left: auto; background: var(--cc); color: white; font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 100px; }
    .sb-footer { padding: 12px 14px; border-top: 1px solid var(--border); font-size: 10.5px; color: var(--muted); text-align: center; }

    .page-title { font-size: 20px; font-weight: 700; letter-spacing: -.5px; }

    /* ============================================================ CARDS & BUTTONS ============================================================ */
    .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--r-lg); padding: 22px; }
    .btn { display: inline-flex; align-items: center; gap: 5px; padding: 7px 15px; border-radius: var(--r-sm); font-size: 13px; font-weight: 500; cursor: pointer; transition: all .15s; border: none; }
    .btn-primary { background: var(--cc); color: white; }
    .btn-primary:hover { opacity: .88; }
    .btn-secondary { background: rgba(255,255,255,0.06); color: var(--text); border: 1px solid var(--border2); }
    .btn-secondary:hover { background: rgba(255,255,255,0.1); }
    .btn-ghost { background: none; color: var(--text2); border: 1px solid var(--border); }
    .btn-ghost:hover { background: rgba(255,255,255,0.04); color: var(--text); }
    .btn-danger { background: rgba(239,68,68,.1); color: #EF4444; border: 1px solid rgba(239,68,68,.2); }
    .btn-success { background: rgba(16,185,129,.1); color: #10B981; border: 1px solid rgba(16,185,129,.2); }
    .btn-sm { padding: 5px 10px; font-size: 12px; }
    .btn-icon { padding: 6px 8px; }

    /* ============================================================ FORMS ============================================================ */
    .form-group { margin-bottom: 14px; }
    .form-label { display: block; font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 5px; }
    .form-control { width: 100%; padding: 8px 11px; background: var(--input); border: 1px solid var(--iborder); border-radius: var(--r-sm); color: var(--text); font-size: 13.5px; outline: none; }
    .form-control:focus { border-color: var(--cc); }
    select.form-control { cursor: pointer; }
    select.form-control option { background: #1a1d28; color: var(--text); }
    textarea.form-control { resize: vertical; min-height: 75px; }
    .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(165px, 1fr)); gap: 14px; }

    /* ============================================================ TABLES ============================================================ */
    .table-wrap { border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    th { background: rgba(255,255,255,0.025); padding: 9px 12px; text-align: left; font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; border-bottom: 1px solid var(--border); }
    td { padding: 11px 12px; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 13.5px; }
    tr.clickable { cursor: pointer; }
    tr.clickable:hover td { background: rgba(255,255,255,0.02); }
    
    .badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 9px; border-radius: 100px; font-size: 11.5px; font-weight: 600; }
    .bdot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }

    .company-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .co-card { border: 2px solid var(--border); border-radius: var(--r); padding: 14px 12px; cursor: pointer; text-align: center; }
    .co-card:hover { border-color: var(--border2); }
    .co-card.active { border-color: var(--cc) !important; background: var(--cc-dim) !important; }
    .co-icon { width: 42px; height: 42px; border-radius: 50%; margin: 0 auto 8px; display: flex; align-items: center; justify-content: center; font-size: 20px; }

    .items-table .form-control { background: transparent; border: 1px solid transparent; padding: 5px 8px; }
    .items-table .form-control:focus { background: var(--input); border-color: var(--cc); }
    .totals-box { background: var(--card2); border: 1px solid var(--border); border-radius: var(--r); padding: 14px 18px; min-width: 260px; }
    .tot-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 13px; }
    .tot-row.final { border-top: 1px solid var(--border); margin-top: 6px; padding-top: 10px; font-size: 17px; font-weight: 800; }

    .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.72); backdrop-filter: blur(5px); z-index: 300; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .modal { background: var(--card); border: 1px solid var(--border2); border-radius: var(--r-lg); padding: 26px; width: 100%; max-width: 520px; }
    .modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 18px; }
    .supplier-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; margin-top: 18px; }
    .supplier-card { background: var(--card2); border: 1px solid var(--border); border-radius: var(--r); padding: 16px; display: flex; flex-direction: column; gap: 8px; }
    .supplier-card-name { font-size: 14px; font-weight: 700; color: var(--text); }
    .supplier-card-detail { font-size: 12px; color: var(--text2); line-height: 1.5; }
    .supplier-card-actions { display: flex; gap: 8px; margin-top: 4px; }

    .empty { text-align: center; padding: 56px 20px; }
    .empty-ico { font-size: 44px; margin-bottom: 10px; }
    .empty-title { font-size: 15px; font-weight: 600; margin-bottom: 5px; }
    .empty-desc { color: var(--text2); font-size: 13px; margin-bottom: 18px; }

    .flex { display: flex; } .justify-between { justify-content: space-between; } .items-center { align-items: center; } .gap-2 { gap: 8px; } .mb-3 { margin-bottom: 12px; } .mb-4 { margin-bottom: 16px; }

    /* ============================================================ PRINT AREA ============================================================ */
    #print-area { display: none; }

    /* Estilos EXACTOS para imprimir como el formato de la imagen, pero más modernos y compactos */
    .po-print-wrapper {
      font-family: 'Inter', Arial, sans-serif;
      color: #000;
      background: #fff;
      width: 100%;
      max-width: 800px;
      margin: 0 auto;
      padding: 0;
    }
    
    .print-container {
      border: 2px solid #000;
      width: 100%;
      box-sizing: border-box;
      min-height: 25.5cm;
      display: flex;
      flex-direction: column;
      background: #fff;
    }
    
    .po-section { border-bottom: 2px solid #000; }
    .po-section:last-child { border-bottom: none; }
    .po-flex { display: flex; align-items: center; }
    .text-center { text-align: center; }
    
    .po-table-container { flex-grow: 1; border-bottom: 2px solid #000; }
    .po-table { width: 100%; border-collapse: collapse; font-size: 9pt; height: 100%; }
    .po-table th, .po-table td { border-bottom: 1px solid #000; border-right: 1px solid #000; padding: 5px 8px; height: 24px; vertical-align: top; }
    .po-table th:last-child, .po-table td:last-child { border-right: none; }
    .po-table th { text-align: center; border-bottom: 2px solid #000; font-weight: bold; font-size: 9pt; vertical-align: middle; }
    .po-table tr:last-child td { border-bottom: none; }
    
    .po-table-total-row td { border-bottom: 1px solid #000; }

    @media print {
      * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
      #app { display: none !important; }
      #print-area { display: block !important; }
      body { background: white !important; margin: 0; padding: 0; }
      @page { margin: 0.5cm; size: Letter portrait; }
    }
  </style>
</head>

</div>

async function hydrate() {
  const { data: sups } = await supabase.from('proveedores').select('*');
  const { data: pos } = await supabase.from('ordenes_compra').select('*');
  
  if (sups && sups.length > 0) {
    S.suppliers = sups;
  } else {
    const s = localStorage.getItem('poc_sup');
    if (s) S.suppliers = JSON.parse(s);
  }

  if (pos && pos.length > 0) {
    S.pos = pos.map(p => ({
      id: p.id,
      company: p.company,
      poNumber: p.po_number,
      supplierName: p.supplier_name,
      supplierId: p.supplier_id,
      supplierRfc: p.supplier_rfc,
      supplierAddress: p.supplier_address,
      centroCosto: p.centro_costo,
      departamento: p.departamento,
      issueDate: p.issue_date,
      hasExtraCol: p.has_extra_col,
      extraColName: p.extra_col_name,
      currency: p.currency,
      total: p.total,
      autorizo: p.autorizo,
      solicitante: p.solicitante,
      datosFactura: p.datos_factura,
      notasRecoleccion: p.notas_recoleccion,
      status: p.status,
      items: p.items
    }));
  } else {
    const p = localStorage.getItem('poc_pos');
    if (p) S.pos = JSON.parse(p);
  }
  
  defaultSuppliers.forEach(ds => {
    if (!S.suppliers.find(sup => sup.name === ds.name)) {
      S.suppliers.push(ds)
    }
  })
  localStorage.setItem('poc_sup', JSON.stringify(S.suppliers))

  const c = localStorage.getItem('poc_co')
  if (c) {
    const saved = JSON.parse(c)
    Object.keys(COMPANIES).forEach(k => { if (saved[k]) S.companies[k] = { ...COMPANIES[k], ...saved[k], logoHtml: COMPANIES[k].logoHtml } })
  }
}

/* ====================================================================
   UTILS
==================================================================== */
function genPONum(company) {
  const co = S.companies[company]
  const yr = new Date().getFullYear().toString().slice(-2)
  const pos = S.pos.filter(p => p.company === company)
  let max = 0
  pos.forEach(p => {
    const m = p.poNumber.match(/-(\d+)$/)
    if (m) { const n = parseInt(m[1]); if (n > max) max = n }
  })
  return `${co.prefix}-${yr}-${String(max + 1).padStart(4, '0')}`
}

function fmtNum(n) {
  return new Intl.NumberFormat('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(n || 0)
}

function fmtDate(dStr) {
  if (!dStr) return ''
  const d = new Date(dStr + 'T12:00:00Z')
  const m = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic']
  return `${d.getUTCDate()}-${m[d.getUTCMonth()]}-${d.getUTCFullYear().toString().slice(-2)}`
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }

function formatToWords(amount, currency) {
  const isUSD = currency === 'USD'
  const intPart = Math.floor(amount)
  const decPart = Math.round((amount - intPart) * 100)
  
  const units = ["", "un", "dos", "tres", "cuatro", "cinco", "seis", "siete", "ocho", "nueve"]
  const teens = ["diez", "once", "doce", "trece", "catorce", "quince", "dieciséis", "diecisiete", "dieciocho", "diecinueve"]
  const tens = ["", "diez", "veinte", "treinta", "cuarenta", "cincuenta", "sesenta", "setenta", "ochenta", "noventa"]
  const hundreds = ["", "ciento", "doscientos", "trescientos", "cuatrocientos", "quinientos", "seiscientos", "setecientos", "ochocientos", "novecientos"]

  function convertGroup(n) {
    if (n === 0) return ""
    if (n === 100) return "cien"
    let res = ""
    if (n > 99) { res += hundreds[Math.floor(n / 100)] + " "; n %= 100 }
    if (n > 9 && n < 20) { res += teens[n - 10] + " "; return res }
    if (n > 19) {
      if (n === 20) { res += "veinte "; return res }
      if (n > 20 && n < 30) { res += "veinti" + units[n - 20] + " "; return res }
      res += tens[Math.floor(n / 10)]
      n %= 10
      if (n > 0) res += " y "
      else res += " "
    }
    if (n > 0) res += units[n] + " "
    return res
  }

  if (intPart === 0) return `Cero ${isUSD ? 'dólares' : 'pesos'} ${String(decPart).padStart(2,'0')}/100`

  let res = ""
  let millions = Math.floor(intPart / 1000000)
  let thousands = Math.floor((intPart % 1000000) / 1000)
  let ones = intPart % 1000

  if (millions > 0) {
    if (millions === 1) res += "Un millón "
    else res += convertGroup(millions) + "millones "
  }
  if (thousands > 0) {
    if (thousands === 1) res += "Mil "
    else res += convertGroup(thousands) + "mil "
  }
  if (ones > 0) res += convertGroup(ones)

  res = res.trim()
  res = res.charAt(0).toUpperCase() + res.slice(1)
  
  return `${res} ${isUSD ? 'dólares' : 'pesos'} ${String(decPart).padStart(2,'0')}/100`
}

function calcTotals(items, hasExtraCol) {
  return items.reduce((s, i) => {
    const extraMult = hasExtraCol && i.extraQty ? parseFloat(i.extraQty||1) : 1;
    return s + (parseFloat(i.quantity||0) * extraMult * parseFloat(i.unitPrice||0));
  }, 0)
}

/* IVA opcional (monto fijo): devuelve el monto sólo si es > 0, si no 0 */
function ivaOf(f) {
  const v = parseFloat(f.ivaAmount);
  return (!isNaN(v) && v > 0) ? v : 0;
}

function delItem(id) { syncForm(); if(S.form.items.length>1) { S.form.items = S.form.items.filter(i=>i.id!==id); render() } }
function updItem(id, field, val) { 
  const it = S.form.items.find(i=>i.id===id); if(it) it[field] = val;
  
  if (field === 'description') {
    const supName = document.getElementById('f-supname').value;
    const s = S.suppliers.find(sup => sup.name === supName);
    if (s && s.products) {
      const prod = s.products.find(p => p.description === val);
      if (prod) {
        it.unitPrice = prod.unitPrice;
        const priceInput = document.querySelector(`#ir-${id} input[type="number"]`);
        if (priceInput) priceInput.value = prod.unitPrice;
      }
    }
  }

  const extraMult = S.form.hasExtraCol ? parseFloat(it.extraQty||1) : 1;
  const tot = parseFloat(it.quantity||0) * extraMult * parseFloat(it.unitPrice||0)
  document.getElementById(`it-${id}`).innerText = `$${fmtNum(tot)}`
  updTotal()
}
function updTotal() {
  const curr = document.getElementById('f-curr').value
  document.getElementById('t-curr').innerText = curr
  const c2 = document.getElementById('t-curr2'); if (c2) c2.innerText = curr

  const sub = calcTotals(S.form.items, S.form.hasExtraCol)
  const ivaIn = document.getElementById('f-iva')
  const ivaNum = ivaIn ? parseFloat(ivaIn.value) : NaN
  const ivaVal = (!isNaN(ivaNum) && ivaNum > 0) ? ivaNum : 0
  const grand = sub + ivaVal

  const subEl = document.getElementById('t-sub'); if (subEl) subEl.innerText = fmtNum(sub)
  const ivaEl = document.getElementById('t-iva'); if (ivaEl) ivaEl.innerText = fmtNum(ivaVal)
  document.getElementById('t-tot').innerText = fmtNum(grand)

  const show = ivaVal > 0 ? 'block' : 'none'
  const subRow = document.getElementById('t-subrow'); if (subRow) subRow.style.display = show
  const ivaRow = document.getElementById('t-ivarow'); if (ivaRow) ivaRow.style.display = show
}

function savePO() {
  const data = readForm()
  if (!data.supplierName) return alert('Escribe el nombre del proveedor.')
  if (!data.centroCosto) return alert('Selecciona un Centro de Costo antes de guardar.')
  
  if (S.form.editMode && S.form.id) {
    const idx = S.pos.findIndex(p => p.id === S.form.id)
    if (idx >= 0) S.pos[idx] = { ...S.pos[idx], ...data }
  } else {
    S.pos.push({ id: 'po_'+Date.now(), ...data })
  }
  
  let targetSup = null;
  if (data.supplierName && !data.supplierId) {
    const existing = S.suppliers.find(s => s.name.toLowerCase() === data.supplierName.toLowerCase())
    if (!existing) {
      targetSup = { id: 's_'+Date.now(), name: data.supplierName, rfc: data.supplierRfc||'', address: data.supplierAddress, products: [] }
      S.suppliers.push(targetSup)
    } else {
      targetSup = existing;
    }
  } else if (data.supplierId) {
    const idx = S.suppliers.findIndex(s => s.id === data.supplierId)
    if (idx >= 0) {
      S.suppliers[idx] = { ...S.suppliers[idx], name: data.supplierName, rfc: data.supplierRfc||'', address: data.supplierAddress }
      targetSup = S.suppliers[idx];
    }
  }

  if (targetSup) {
    if (!targetSup.products) targetSup.products = []
    data.items.forEach(it => {
      const desc = (it.description || '').trim()
      if (desc) {
        const existingProd = targetSup.products.find(p => p.description.toLowerCase() === desc.toLowerCase())
        if (!existingProd) {
          targetSup.products.push({ description: desc, unitPrice: it.unitPrice })
        } else {
          existingProd.unitPrice = it.unitPrice // update to latest price
        }
      }
    })
  }
  
  persist()
  // Print the saved/edited PO
  let savedId
  if (S.form.editMode && S.form.id) {
    savedId = S.form.id
  } else {
    savedId = S.pos[S.pos.length - 1].id
  }
  printPO(savedId)
  S.form = resetForm()
  go('dashboard')
}

              <tr>
                <td><b>${esc(p.poNumber)}</b></td>
                <td>${esc(S.companies[p.company]?.name || p.company)}</td>

function setSupPage(p) { S.supPage = p; render(); }

function vSuppliers() {

  return `
  <div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
      <div>
        <h2 class="page-title">📦 Catálogo de Proveedores</h2>
        <p style="color:var(--text2);font-size:13px;margin-top:4px;">${S.suppliers.length} proveedor${S.suppliers.length!==1?'es':''} en total</p>
      </div>
      <div style="display:flex; gap:15px; align-items:center;">
        <input type="text" id="sup-search-input" class="form-control" placeholder="Buscar proveedor, rfc o tel..." value="${esc(S.supSearch || '')}" oninput="setSupSearch(this.value)" style="width:250px;">
        <button class="btn btn-primary" onclick="openSupplierModal(null)">➕ Nuevo Proveedor</button>
      </div>
    </div>
    
    ${filtered.length === 0 ? `
      <div class="card empty">
        <div class="empty-ico">${S.suppliers.length === 0 ? '📦' : '🔍'}</div>
        <p class="empty-title">${S.suppliers.length === 0 ? 'Sin proveedores aún' : 'No hay resultados'}</p>
        <p class="empty-desc">${S.suppliers.length === 0 ? 'Los proveedores se agregan automáticamente al guardar órdenes.' : 'Intenta buscar con otros términos.'}</p>
        ${S.suppliers.length === 0 ? `<button class="btn btn-primary" onclick="openSupplierModal(null)">➕ Agregar Primer Proveedor</button>` : ''}
      </div>
    ` : `
      <div class="supplier-grid">
        ${currentItems.map(s => `
          <div class="supplier-card">
            <div class="supplier-card-name">🏢 ${esc(s.name)}</div>
            ${s.rfc ? `<div class="supplier-card-detail"><b>RFC:</b> ${esc(s.rfc)}</div>` : ''}
            ${s.address ? `<div class="supplier-card-detail" style="white-space:pre-line;">${esc(s.address)}</div>` : '<div class="supplier-card-detail" style="color:var(--muted);font-style:italic;">Sin dirección registrada</div>'}

            </div>
          </div>
        `).join('')}
      </div>
      
      <div style="display:flex; justify-content:center; align-items:center; gap:15px; margin-top:25px; padding-bottom:30px;">
        <button class="btn btn-secondary" onclick="setSupPage(${page - 1})" ${page <= 1 ? 'disabled style="opacity:0.4;cursor:not-allowed;"' : ''}>◀ Anterior</button>
        <span style="font-size:13.5px; font-weight:600; color:var(--text2);">Página ${page} de ${totalPages} <span style="font-weight:400;">(${filtered.length} resultados)</span></span>
        <button class="btn btn-secondary" onclick="setSupPage(${page + 1})" ${page >= totalPages ? 'disabled style="opacity:0.4;cursor:not-allowed;"' : ''}>Siguiente ▶</button>
      </div>
    `}
  </div>
  <div id="supplier-modal" class="modal-bg" style="display:none;" onclick="if(event.target===this)closeSupplierModal()">
    <div class="modal">
      <h3 id="sup-modal-title">Nuevo Proveedor</h3>
      <input type="hidden" id="sup-edit-id">
      <div class="form-group">
        <label class="form-label">Nombre del Proveedor *</label>
        <input id="sup-name" class="form-control" placeholder="Ej. Ferretería El Clavo...">
      </div>
      <div class="form-group">
        <label class="form-label">RFC</label>
        <input id="sup-rfc" class="form-control" placeholder="XAXX010101000">
      </div>
      <div class="form-group">
        <label class="form-label">Dirección / Datos de Contacto</label>
        <textarea id="sup-addr" class="form-control" rows="4" placeholder="Calle, Número, Colonia, Ciudad...&#10;Tel. 342 123 4567&#10;correo@proveedor.com"></textarea>
      </div>
      <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:18px;">
        <button class="btn btn-ghost" onclick="closeSupplierModal()">Cancelar</button>
        <button class="btn btn-primary" onclick="saveSupplier()">💾 Guardar Proveedor</button>
      </div>
    </div>
  </div>`
}

function openSupplierModal(supplierId) {
  const modal = document.getElementById('supplier-modal')
  if (!modal) return
  modal.style.display = 'flex'
  if (supplierId) {
    const s = S.suppliers.find(s => s.id === supplierId)
    if (!s) return
    document.getElementById('sup-modal-title').innerText = 'Editar Proveedor'
    document.getElementById('sup-edit-id').value = s.id
    document.getElementById('sup-name').value = s.name || ''
    document.getElementById('sup-rfc').value = s.rfc || ''
    document.getElementById('sup-addr').value = s.address || ''
  } else {
    document.getElementById('sup-modal-title').innerText = 'Nuevo Proveedor'
    document.getElementById('sup-edit-id').value = ''
    document.getElementById('sup-name').value = ''
    document.getElementById('sup-rfc').value = ''
    document.getElementById('sup-addr').value = ''
  }
  setTimeout(() => document.getElementById('sup-name').focus(), 100)
}

function closeSupplierModal() {
  const modal = document.getElementById('supplier-modal')
  if (modal) modal.style.display = 'none'
}

function saveSupplier() {
  const name = document.getElementById('sup-name').value.trim()
  if (!name) return alert('El nombre del proveedor es obligatorio')
  const rfc = document.getElementById('sup-rfc').value.trim()
  const address = document.getElementById('sup-addr').value.trim()
  const editId = document.getElementById('sup-edit-id').value
  if (editId) {
    const idx = S.suppliers.findIndex(s => s.id === editId)
    if (idx >= 0) S.suppliers[idx] = { ...S.suppliers[idx], name, rfc, address }
  } else {
    if (S.suppliers.find(s => s.name.toLowerCase() === name.toLowerCase())) {
      return alert('Ya existe un proveedor con ese nombre.')
    }
    S.suppliers.push({ id: 's_' + Date.now(), name, rfc, address })
  }
  persist()
  closeSupplierModal()
  render()
}

async function deleteSupplier(supplierId) {
  const s = S.suppliers.find(s => s.id === supplierId)
  if (!s) return
  if (!confirm(`¿Eliminar el proveedor "${s.name}"?\nEsta acción no afecta las órdenes existentes.`)) return
  S.suppliers = S.suppliers.filter(s => s.id !== supplierId)
  await supabase.from('proveedores').delete().eq('id', supplierId);
  persist()
  render()
}

function setProdSup(v) { S.prodSup = v; S.prodPage = 1; render(); }
function setProdSearch(v) { S.prodSearch = v; S.prodPage = 1; render(); 
  const el = document.getElementById('prod-search');
  if (el) { el.focus(); el.setSelectionRange(el.value.length, el.value.length); }
}
function setProdPage(p) { S.prodPage = p; render(); }

function vProducts() {
  const q = (S.prodSearch || '').toLowerCase();
  const fSup = S.prodSup || '';
  
  let allProducts = [];
  S.suppliers.forEach(s => {
    if (s.products) {
      s.products.forEach(p => {
        allProducts.push({ supId: s.id, supName: s.name, desc: p.description, price: p.unitPrice });
      });
    }
  });
  
  let filtered = allProducts;
  if (fSup) filtered = filtered.filter(p => p.supId === fSup);
  if (q) filtered = filtered.filter(p => p.desc.toLowerCase().includes(q) || p.supName.toLowerCase().includes(q));
  
  filtered.sort((a,b) => a.desc.localeCompare(b.desc));
  
  const perPage = 20;
  const totalPages = Math.ceil(filtered.length / perPage) || 1;
  const page = Math.min(S.prodPage || 1, totalPages);
  const current = filtered.slice((page - 1) * perPage, page * perPage);

  const supOptions = S.suppliers.map(s => `<option value="${s.id}" ${fSup===s.id?'selected':''}>${esc(s.name)}</option>`).join('');

  return `
  <div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;flex-wrap:wrap;gap:12px;">
      <div>
        <h2 class="page-title">🏷️ Catálogo de Productos</h2>
        <p style="color:var(--text2);font-size:13px;margin-top:4px;">${allProducts.length} producto${allProducts.length!==1?'s':''} registrados</p>
      </div>
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
        <input type="text" id="prod-search" class="form-control" placeholder="Buscar producto..." value="${esc(S.prodSearch||'')}" oninput="setProdSearch(this.value)" style="width:230px;">
        <select class="form-control" style="width:200px;" onchange="setProdSup(this.value)">
          <option value="">Todos los proveedores</option>
          ${supOptions}
        </select>
        <button class="btn btn-ghost btn-sm" onclick="S.prodSearch='';S.prodSup='';S.prodPage=1;render()" title="Limpiar filtros">✕ Limpiar</button>
      </div>
    </div>
    
    ${filtered.length === 0 ? `
      <div class="card empty">
        <div class="empty-ico">🏷️</div>
        <p class="empty-title">No hay productos</p>
        <p class="empty-desc">No se encontraron productos con estos filtros o no has registrado ninguno aún.</p>
      </div>
    ` : `
      <div class="card" style="padding:0;overflow:hidden;">
        <table style="width:100%;">
          <thead><tr><th>Descripción del Producto</th><th>Proveedor</th><th>Último Precio Unit.</th><th>Acciones</th></tr></thead>
          <tbody>
            ${current.map(p => `
              <tr>
                <td><b>${esc(p.desc)}</b></td>
                <td>${esc(p.supName)}</td>
                <td>$${fmtNum(p.price)}</td>
                <td>
                  <button class="btn btn-ghost btn-sm" onclick="openProductModal('${esc(p.supId)}', '${esc(p.desc).replace(/'/g,"\\'").replace(/"/g,'&quot;')}', ${p.price})">✏️ Editar</button>
                  <button class="btn btn-danger btn-sm" onclick="deleteProduct('${esc(p.supId)}', '${esc(p.desc).replace(/'/g,"\\'").replace(/"/g,'&quot;')}')">🗑 Eliminar</button>
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
      <div style="display:flex;justify-content:center;align-items:center;gap:15px;margin-top:20px;padding-bottom:20px;">
        <button class="btn btn-secondary" onclick="setProdPage(${page-1})" ${page<=1?'disabled style="opacity:0.4;cursor:not-allowed;"':''}>◀ Anterior</button>
        <span style="font-size:13.5px;font-weight:600;color:var(--text2);">Página ${page} de ${totalPages} <span style="font-weight:400;">(${filtered.length} resultados)</span></span>
        <button class="btn btn-secondary" onclick="setProdPage(${page+1})" ${page>=totalPages?'disabled style="opacity:0.4;cursor:not-allowed;"':''}>Siguiente ▶</button>
      </div>
    `}
  </div>
  <div id="product-modal" class="modal-bg" style="display:none;" onclick="if(event.target===this)closeProductModal()">
    <div class="modal">
      <h3 id="prod-modal-title">Editar Producto</h3>
      <input type="hidden" id="prod-edit-sup-id">
      <input type="hidden" id="prod-edit-old-desc">
      <div class="form-group">
        <label class="form-label">Descripción</label>
        <input id="prod-desc" class="form-control">
      </div>
      <div class="form-group">
        <label class="form-label">Precio Unitario</label>
        <input type="number" step="0.01" id="prod-price" class="form-control">
      </div>
      <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:18px;">
        <button class="btn btn-ghost" onclick="closeProductModal()">Cancelar</button>
        <button class="btn btn-primary" onclick="saveProduct()">💾 Guardar</button>
      </div>
    </div>
  </div>
  `
}

function openProductModal(supId, desc, price) {
  const modal = document.getElementById('product-modal');
  if (!modal) return;
  modal.style.display = 'flex';
  document.getElementById('prod-edit-sup-id').value = supId;
  document.getElementById('prod-edit-old-desc').value = desc;
  document.getElementById('prod-desc').value = desc;
  document.getElementById('prod-price').value = price;
  setTimeout(() => document.getElementById('prod-price').focus(), 100);
}
function closeProductModal() {
  const modal = document.getElementById('product-modal');
  if (modal) modal.style.display = 'none';
}
function saveProduct() {
  const supId = document.getElementById('prod-edit-sup-id').value;
  const oldDesc = document.getElementById('prod-edit-old-desc').value;
  const newDesc = document.getElementById('prod-desc').value.trim();
  const price = parseFloat(document.getElementById('prod-price').value || 0);
  if (!newDesc) return alert('La descripción es obligatoria');
  const sup = S.suppliers.find(s => s.id === supId);
  if (sup && sup.products) {
    const prod = sup.products.find(p => p.description === oldDesc);
    if (prod) {
      prod.description = newDesc;
      prod.unitPrice = price;
      persist();
      closeProductModal();
      render();
    }
  }
}
function deleteProduct(supId, desc) {
  if (!confirm('¿Seguro que deseas eliminar el producto "' + desc + '" del catálogo?')) return;
  const sup = S.suppliers.find(s => s.id === supId);
  if (sup && sup.products) {
    sup.products = sup.products.filter(p => p.description !== desc);
    persist();
    render();
  }
}

function vSettings() { return `<div class="card"><h3>Configuración</h3><p>La configuración está precargada por sistema.</p></div>` }

function printPO(id) {
  const po = S.pos.find(p=>p.id===id)
  if (!po) return
  const co = S.companies[po.company]

  let itemsHtml = ''
  for(let i=0; i<12; i++) {
    const it = po.items[i]
    if (it) {
      const extraMult = po.hasExtraCol ? parseFloat(it.extraQty||1) : 1;
      itemsHtml += `
      <tr>
        <td style="text-align:center;">${esc(it.quantity)}</td>
        ${po.hasExtraCol ? `<td style="text-align:center;">${esc(it.extraQty||'')}</td>` : ''}

        <td>${esc(it.description)}</td>
        <td style="text-align:right;">$ ${fmtNum(it.unitPrice)}</td>
        <td style="text-align:right;">$ ${fmtNum(parseFloat(it.quantity||0)*extraMult*parseFloat(it.unitPrice||0))}</td>
      </tr>`
    } else {
      itemsHtml += `<tr><td></td>${po.hasExtraCol?'<td></td>':''}<td></td><td></td><td></td><td></td></tr>`
    }
  }

  const html = `
  <div class="po-print-wrapper">
    <div class="print-container">
      
      <div class="po-section po-flex" style="padding: 10px 20px;">
        <div style="width: 50%;">${co.logoHtml}</div>

      <div class="po-section text-center" style="padding: 8px; font-weight: bold; font-size: 11pt;">

      </div>
      
      <div class="po-section po-flex" style="padding: 10px 20px; font-size: 10pt;">
        <div style="width: 50%;"><b>CENTRO DE COSTO:</b> ${esc(po.centroCosto ? costCenterLabel(po.centroCosto) : po.departamento)}</div>
        <div style="width: 50%; text-align: right;"><b>FECHA:</b> ${fmtDate(po.issueDate)}</div>
      </div>
      
      <div class="po-section" style="padding: 10px 20px; font-size: 10pt; line-height: 1.4;">
        <b>EMITIDO PARA:</b><br>
        ${esc(po.supplierName)}<br>
        ${esc(po.supplierAddress).replace(/\n/g, '<br>')}
      </div>
      
      <div class="po-table-container">
        <table class="po-table">
          <thead>
            <tr>
              <th style="width:10%">CANTIDAD</th>
              ${po.hasExtraCol ? `<th style="width:10%">${esc(po.extraColName||'FACTOR')}</th>` : ''}
              <th style="width:12%">UNIDAD</th>
              <th style="width:${po.hasExtraCol?'30%':'40%'}">DESCRIPCIÓN</th>
              <th style="width:18%">P.UNITARIO</th>
              <th style="width:20%">IMPORTE</th>
            </tr>
          </thead>
          <tbody>
            ${itemsHtml}
            ${(function(){
              const ivaAmt = parseFloat(po.ivaAmount);
              const hasIva = !isNaN(ivaAmt) && ivaAmt > 0;
              if (!hasIva) return '';
              const subtotal = (po.subtotal != null) ? po.subtotal : (po.total - ivaAmt);
              const cs = po.hasExtraCol ? '4' : '3';
              return `
            <tr class="po-table-total-row">
              <td colspan="${cs}" style="border-right: 2px solid #000;"></td>
              <td style="font-weight: bold;">SUBTOTAL</td>

              <td colspan="${cs}" style="border-right: 2px solid #000;"></td>

            </tr>`;
            })()}
            <tr class="po-table-total-row">
              <td colspan="${po.hasExtraCol?'4':'3'}" style="border-right: 2px solid #000; border-bottom: 1px solid #000;"></td>
              <td style="font-weight: bold;">TOTAL USD</td>
              <td style="text-align: right;">${po.currency==='USD' ? '$ '+fmtNum(po.total) : '$ -'}</td>
            </tr>
            <tr class="po-table-total-row">

              <td style="font-weight: bold; border-bottom: 1px solid #000;">TOTAL MXN</td>

    </div>

  document.getElementById('print-area').innerHTML = html
  window.print()
}
